<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>УкрС++ — IDE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--surf:#13151e;--surf2:#1a1d28;--border:#252836;
  --accent:#4fc3f7;--yellow:#ffd54f;--green:#a5d6a7;--red:#ef5350;
  --text:#e8eaf6;--muted:#6b7280;--kw:#c792ea;--type:#80cbc4;--func:#82aaff;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Unbounded',sans-serif;font-size:16px;background:linear-gradient(135deg,var(--accent),var(--yellow),var(--kw));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-family:'Inter',sans-serif;font-size:11px;font-weight:400;color:var(--muted);margin-left:8px;-webkit-text-fill-color:var(--muted)}
.hact{display:flex;gap:6px;align-items:center}
select.exsel{background:var(--surf2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;outline:none}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .15s}
.btn-ghost{background:var(--surf2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-blue{background:linear-gradient(135deg,var(--accent),#0288d1);color:#000;font-weight:600}
.btn-blue:hover{box-shadow:0 3px 14px rgba(79,195,247,.4);transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,#66bb6a,#2e7d32);color:#fff;font-weight:600}
.btn-green:hover{box-shadow:0 3px 14px rgba(102,187,106,.4);transform:translateY(-1px)}
.btn-green:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.main{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
.sidebar{width:220px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-title{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-scroll{flex:1;overflow-y:auto}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-cat{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 14px 3px}
.kw-row{display:flex;justify-content:space-between;align-items:center;padding:3px 14px;font-size:11px;border-bottom:1px solid rgba(37,40,54,.5)}
.kw-uk{font-family:'JetBrains Mono',monospace;color:var(--kw);font-weight:700;font-size:11px}
.kw-cpp{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:10px}
/* EDITOR */
.editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tab-bar{display:flex;align-items:center;background:var(--surf);border-bottom:1px solid var(--border);height:34px;padding:0 8px;flex-shrink:0}
.tab{padding:4px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;border-radius:4px 4px 0 0;color:var(--accent);background:var(--surf2);border-bottom:2px solid var(--accent)}
.ed-wrap{display:flex;flex:1;overflow:hidden;position:relative}
.ln{width:44px;padding:14px 8px 14px 0;text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;color:var(--muted);background:var(--surf2);border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;user-select:none}
.editor{position:absolute;top:0;left:44px;right:0;bottom:0;background:var(--surf2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;border:none;outline:none;resize:none;padding:14px;caret-color:var(--accent);tab-size:4;white-space:pre;overflow:auto}
.editor::-webkit-scrollbar{width:6px;height:6px}
.editor::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* RIGHT */
.rpanel{width:360px;display:flex;flex-direction:column;background:var(--surf);border-left:1px solid var(--border);flex-shrink:0}
.ph{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.dot.err{background:var(--red)}
.dot.run{background:var(--yellow)}
pre.cpp-out{flex:1;overflow:auto;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;white-space:pre;color:var(--text);opacity:.9}
pre.cpp-out::-webkit-scrollbar{width:3px}
pre.cpp-out::-webkit-scrollbar-thumb{background:var(--border)}
.console{flex:1;overflow-y:auto;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.65;min-height:0}
.console::-webkit-scrollbar{width:3px}
.console::-webkit-scrollbar-thumb{background:var(--border)}
.c-info{color:var(--accent)}
.c-ok{color:var(--green)}
.c-err{color:var(--red)}
.c-out{color:var(--text)}
.c-warn{color:var(--yellow)}
.stdin-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid var(--border);flex-shrink:0}
.stdin-bar label{font-size:11px;color:var(--muted);white-space:nowrap}
.stdin-in{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 8px;outline:none}
.stdin-in:focus{border-color:var(--accent)}
.statusbar{height:22px;background:linear-gradient(90deg,#0277bd,#01579b);display:flex;align-items:center;padding:0 14px;gap:14px;font-size:11px;color:rgba(255,255,255,.8);flex-shrink:0}
.badge{background:rgba(255,255,255,.2);padding:0 5px;border-radius:3px;font-size:10px;font-weight:600}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center">
    <div class="logo">УкрС++<span class="logo-sub">v1.0 — Мова програмування</span></div>
  </div>
  <div class="hact">
    <select class="exsel" id="exSel" onchange="loadExample(this.value)">
      <option value="">— Приклади —</option>
      <option value="hello">Привіт, Світ!</option>
      <option value="loop">Цикли та умови</option>
      <option value="func">Функції</option>
      <option value="array">Масиви та вектори</option>
      <option value="cls">Класи</option>
      <option value="tmpl">Шаблони</option>
    </select>
    <button class="btn btn-ghost" onclick="clearAll()">🗑 Очистити</button>
    <button class="btn btn-blue" onclick="doTranspile()">⟳ Транспілювати</button>
    <button class="btn btn-green" id="btnRun" onclick="runCode()">▶ Запустити</button>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sb-title">Словник ключових слів</div>
    <div class="sb-scroll" id="kwRef"></div>
  </div>
  <div class="editor-pane">
    <div class="tab-bar"><div class="tab">main.укрcpp</div></div>
    <div class="ed-wrap">
      <div class="ln" id="ln">1</div>
      <textarea class="editor" id="ed" spellcheck="false"
        oninput="updateLn()" onscroll="syncScroll()"
        onkeydown="handleTab(event)" onclick="updateCursor()" onkeyup="updateCursor()"
        placeholder="// Пишіть код УкрС++ тут..."></textarea>
    </div>
  </div>
  <div class="rpanel">
    <div style="height:50%;display:flex;flex-direction:column;border-bottom:1px solid var(--border);min-height:0">
      <div class="ph"><span>C++ (транспільований)</span><div class="dot" id="dotCpp"></div></div>
      <pre class="cpp-out" id="cppOut">// Тут з'явиться транспільований C++ код</pre>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="ph"><span>Консоль / Результат</span><div class="dot" id="dotCon"></div></div>
      <div class="console" id="con"></div>
      <div class="stdin-bar">
        <label>stdin:</label>
        <input class="stdin-in" id="stdinIn" type="text" placeholder="Дані для програми (якщо є cin)...">
      </div>
    </div>
  </div>
</div>
<div class="statusbar">
  <span>🇺🇦 УкрС++</span>
  <span class="badge">UTF-8</span>
  <span id="stCursor">Рядок 1, Стовпець 1</span>
  <span id="stWords">0 слів</span>
</div>
<script>
// ============================================================
// KEYWORD TABLE  (uk → cpp, sorted longest-first automatically)
// Rules:
//   - Ukrainian identifiers map 1-to-1 to C++ tokens
//   - Include headers map to their real names
//   - IO keywords map to std:: versions
// ============================================================
const KW = [
  // --- Типи даних ---
  {uk:'беззнакове',    cpp:'unsigned',      cat:'type'},
  {uk:'логічний',      cpp:'bool',          cat:'type'},
  {uk:'дійснеф',       cpp:'float',         cat:'type'},
  {uk:'дійсне',        cpp:'double',        cat:'type'},
  {uk:'символ',        cpp:'char',          cat:'type'},
  {uk:'порожньо',      cpp:'void',          cat:'type'},
  {uk:'коротке',       cpp:'short',         cat:'type'},
  {uk:'довге',         cpp:'long',          cat:'type'},
  {uk:'ціле',          cpp:'int',           cat:'type'},
  {uk:'авто',          cpp:'auto',          cat:'type'},
  {uk:'розмір_т',      cpp:'size_t',        cat:'type'},

  // --- Керування потоком ---
  {uk:'інакше_якщо',   cpp:'else if',       cat:'flow'},
  {uk:'продовжити',    cpp:'continue',      cat:'flow'},
  {uk:'перервати',     cpp:'break',         cat:'flow'},
  {uk:'повернути',     cpp:'return',        cat:'flow'},
  {uk:'зробити',       cpp:'do',            cat:'flow'},
  {uk:'поки',          cpp:'while',         cat:'flow'},
  {uk:'інакше',        cpp:'else',          cat:'flow'},
  {uk:'якщо',          cpp:'if',            cat:'flow'},
  {uk:'для',           cpp:'for',           cat:'flow'},
  {uk:'вибрати',       cpp:'switch',        cat:'flow'},
  {uk:'випадок',       cpp:'case',          cat:'flow'},
  {uk:'типово',        cpp:'default',       cat:'flow'},
  {uk:'перейти',       cpp:'goto',          cat:'flow'},

  // --- ООП ---
  {uk:'перевизначити', cpp:'override',      cat:'oop'},
  {uk:'віртуальний',   cpp:'virtual',       cat:'oop'},
  {uk:'захищений',     cpp:'protected',     cat:'oop'},
  {uk:'використовувати',cpp:'using',        cat:'oop'},
  {uk:'простір_імен',  cpp:'namespace',     cat:'oop'},
  {uk:'відкритий',     cpp:'public',        cat:'oop'},
  {uk:'закритий',      cpp:'private',       cat:'oop'},
  {uk:'статичний',     cpp:'static',        cat:'oop'},
  {uk:'зовнішній',     cpp:'extern',        cat:'oop'},
  {uk:'клас_тип',      cpp:'typename',      cat:'oop'},
  {uk:'структура',     cpp:'struct',        cat:'oop'},
  {uk:'шаблон',        cpp:'template',      cat:'oop'},
  {uk:'перелік',       cpp:'enum',          cat:'oop'},
  {uk:'видалити',      cpp:'delete',        cat:'oop'},
  {uk:'новий',         cpp:'new',           cat:'oop'},
  {uk:'клас',          cpp:'class',         cat:'oop'},
  {uk:'друг',          cpp:'friend',        cat:'oop'},
  {uk:'це',            cpp:'this',          cat:'oop'},

  // --- Пам'ять / модифікатори ---
  {uk:'константа',     cpp:'const',         cat:'mem'},
  {uk:'вбудований',    cpp:'inline',        cat:'mem'},
  {uk:'мінливий',      cpp:'volatile',      cat:'mem'},
  {uk:'явний',         cpp:'explicit',      cat:'mem'},
  {uk:'розмір',        cpp:'sizeof',        cat:'mem'},

  // --- Значення ---
  {uk:'нуль_вказ',     cpp:'nullptr',       cat:'val'},
  {uk:'хибність',      cpp:'false',         cat:'val'},
  {uk:'істина',        cpp:'true',          cat:'val'},

  // --- Виключення ---
  {uk:'спробувати',    cpp:'try',           cat:'exc'},
  {uk:'спіймати',      cpp:'catch',         cat:'exc'},
  {uk:'кинути',        cpp:'throw',         cat:'exc'},

  // --- IO (з namespace std) ---
  {uk:'виведення',     cpp:'std::cout',     cat:'io'},
  {uk:'введення',      cpp:'std::cin',      cat:'io'},
  {uk:'помилка_в',     cpp:'std::cerr',     cat:'io'},
  {uk:'новий_рядок',   cpp:'std::endl',     cat:'io'},
  {uk:'стандарт',      cpp:'std',           cat:'io'},

  // --- Бібліотеки / директиви ---
  {uk:'включити',      cpp:'#include',      cat:'lib'},
  {uk:'визначити',     cpp:'#define',       cat:'lib'},
  {uk:'головна',       cpp:'main',          cat:'lib'},

  // --- Стандартні типи та контейнери ---
  {uk:'рядок',         cpp:'std::string',   cat:'lib'},
  {uk:'вектор',        cpp:'std::vector',   cat:'lib'},
  {uk:'карта',         cpp:'std::map',      cat:'lib'},
  {uk:'множина',       cpp:'std::set',      cat:'lib'},
  {uk:'пара',          cpp:'std::pair',     cat:'lib'},
  {uk:'черга',         cpp:'std::queue',    cat:'lib'},
  {uk:'алгоритм',      cpp:'algorithm',     cat:'lib'},
  {uk:'математика',    cpp:'cmath',         cat:'lib'},
];

// Headers: Ukrainian include names → real C++ headers
const HEADERS = {
  'рядок':     'string',
  'вектор':    'vector',
  'карта':     'map',
  'множина':   'set',
  'пара':      'utility',
  'черга':     'queue',
  'стек':      'stack',
  'алгоритм':  'algorithm',
  'математика':'cmath',
  'потоки':    'sstream',
  'файл':      'fstream',
};

const CATS = {
  type:{label:'Типи даних',             color:'#80cbc4'},
  flow:{label:'Керування потоком',      color:'#c792ea'},
  oop: {label:'ООП / Класи',            color:'#82aaff'},
  mem: {label:"Пам'ять / Модифікатори",color:'#ffd54f'},
  val: {label:'Значення',               color:'#f78c6c'},
  exc: {label:'Виключення',             color:'#ef5350'},
  io:  {label:'Введення / Виведення',   color:'#4fc3f7'},
  lib: {label:'Бібліотеки / Типи',      color:'#a5d6a7'},
};

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar() {
  const ref = document.getElementById('kwRef');
  let html = '';
  for (const [cat, info] of Object.entries(CATS)) {
    const list = KW.filter(k => k.cat === cat);
    if (!list.length) continue;
    html += `<div class="sb-cat" style="color:${info.color}">${info.label}</div>`;
    for (const k of list) {
      html += `<div class="kw-row"><span class="kw-uk">${k.uk}</span><span class="kw-cpp">→ ${k.cpp}</span></div>`;
    }
  }
  ref.innerHTML = html;
}

// ============================================================
// TRANSPILER
// ============================================================
function transpileCode(src) {
  const lines = src.split('\n');
  const out = [];

  for (const rawLine of lines) {
    // Separate code part from line comment
    let line = rawLine;
    let comment = '';
    // Find // that's not inside a string
    let inStr = false, strChar = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (!inStr && (c === '"' || c === "'")) { inStr = true; strChar = c; }
      else if (inStr && c === strChar && line[i-1] !== '\\') { inStr = false; }
      else if (!inStr && c === '/' && line[i+1] === '/') {
        comment = line.slice(i);
        line = line.slice(0, i);
        break;
      }
    }

    // Handle #include lines specially
    const includeMatch = line.match(/^(\s*)включити\s+<([^>]+)>/);
    if (includeMatch) {
      const indent = includeMatch[1];
      const hdr = includeMatch[2].trim();
      const realHdr = HEADERS[hdr] || hdr;
      out.push(indent + '#include <' + realHdr + '>' + comment);
      continue;
    }

    // Replace string literals with placeholders to protect them
    const strLiterals = [];
    line = line.replace(/"((?:[^"\\]|\\.)*)"/g, (_, content) => {
      strLiterals.push('"' + content + '"');
      return '\x00STR' + (strLiterals.length - 1) + '\x00';
    });
    line = line.replace(/'((?:[^'\\]|\\.)*)'/g, (_, content) => {
      strLiterals.push("'" + content + "'");
      return '\x00CHR' + (strLiterals.length - 1) + '\x00';
    });

    // Sort KW by length desc so longer tokens match first
    const sorted = [...KW].sort((a, b) => b.uk.length - a.uk.length);
    for (const kw of sorted) {
      // Skip include-related in non-include lines
      const esc = kw.uk.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      // Unicode-aware word boundary: not preceded/followed by word char or cyrillic
      const re = new RegExp('(?<![\\w\u0400-\u04FF])' + esc + '(?![\\w\u0400-\u04FF])', 'g');
      line = line.replace(re, kw.cpp);
    }

    // Restore string literals
    line = line.replace(/\x00STR(\d+)\x00/g, (_, i) => strLiterals[+i]);
    line = line.replace(/\x00CHR(\d+)\x00/g, (_, i) => strLiterals[+i]);

    out.push(line + comment);
  }

  return out.join('\n');
}

function doTranspile() {
  const src = document.getElementById('ed').value;
  if (!src.trim()) { clog('info','// Введіть код для транспіляції'); return; }
  const t0 = performance.now();
  const cpp = transpileCode(src);
  const ms = (performance.now() - t0).toFixed(2);
  document.getElementById('cppOut').textContent = cpp;
  document.getElementById('dotCpp').className = 'dot';
  const used = KW.filter(k => new RegExp('(?<![\\w\u0400-\u04FF])' + k.uk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(?![\\w\u0400-\u04FF])').test(src));
  clearCon();
  clog('ok', '✅ Транспіляція успішна за ' + ms + 'мс');
  clog('info', '📄 Рядків: ' + src.split('\n').length + ' | 🔑 Ключових слів: ' + used.length);
  return cpp;
}

// ============================================================
// RUN via Wandbox
// ============================================================
async function runCode() {
  const src = document.getElementById('ed').value.trim();
  if (!src) { clearCon(); clog('err','✖ Редактор порожній'); return; }

  const cpp = transpileCode(src);
  document.getElementById('cppOut').textContent = cpp;
  document.getElementById('dotCpp').className = 'dot';

  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Компілюємо...';
  document.getElementById('dotCon').className = 'dot run';

  clearCon();
  clog('info', '⏳ Надсилаємо на Wandbox (GCC latest, C++17)...');

  const stdin = document.getElementById('stdinIn').value;

  try {
    const payload = {
      compiler: 'gcc-head',
      code: cpp,
      stdin: stdin,
      // Pass options as separate array items via compiler-option-raw
      'compiler-option-raw': '-std=c++17',
      save: false
    };

    const resp = await fetch('https://wandbox.org/api/compile.json', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
    const d = await resp.json();

    clearCon();

    const hasErr = d.compiler_error && d.compiler_error.trim();
    const hasMsg = d.compiler_message && d.compiler_message.trim();

    if (hasErr) {
      // Show compiler errors — but clean up the anonymous file path
      clog('err', '✖ Помилка компіляції:');
      d.compiler_error.trim().split('\n').forEach(l => {
        clog('err', l.replace(/\/tmp\/[^:]+:/g, 'main.cpp:'));
      });
      document.getElementById('dotCon').className = 'dot err';
    } else {
      if (hasMsg) {
        d.compiler_message.trim().split('\n').forEach(l => {
          if (l.trim()) clog('warn', '⚠ ' + l.replace(/\/tmp\/[^:]+:/g, 'main.cpp:'));
        });
      }
      clog('ok', '✅ Компіляція успішна!');
      clog('info', '──────────────────────────────────');

      if (d.program_output !== undefined && d.program_output !== '') {
        d.program_output.split('\n').forEach(l => clog('out', l));
      } else {
        clog('info', '(програма не вивела нічого)');
      }

      if (d.program_error && d.program_error.trim()) {
        clog('info', '──────── stderr ────────');
        d.program_error.trim().split('\n').forEach(l => clog('err', l));
      }

      clog('info', '──────────────────────────────────');
      const code = d.status;
      clog(
        (code === 0 || code === '0') ? 'ok' : 'err',
        'Код завершення: ' + code
      );
      document.getElementById('dotCon').className = 'dot';
    }
  } catch(e) {
    clearCon();
    clog('err', '✖ Помилка з\'єднання: ' + e.message);
    clog('info', '💡 Перевірте інтернет або спробуйте пізніше');
    document.getElementById('dotCon').className = 'dot err';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '▶ Запустити';
  }
}

// ============================================================
// CONSOLE
// ============================================================
function clog(type, msg) {
  const con = document.getElementById('con');
  const d = document.createElement('div');
  d.className = {err:'c-err', ok:'c-ok', out:'c-out', warn:'c-warn', info:'c-info'}[type] || 'c-info';
  d.textContent = msg;
  con.appendChild(d);
  con.scrollTop = con.scrollHeight;
}
function clearCon() { document.getElementById('con').innerHTML = ''; }
function clearAll() {
  document.getElementById('ed').value = '';
  document.getElementById('cppOut').textContent = "// Тут з'явиться транспільований C++ код";
  clearCon(); updateLn();
}

// ============================================================
// EDITOR HELPERS
// ============================================================
function updateLn() {
  const ed = document.getElementById('ed');
  const n = ed.value.split('\n').length;
  document.getElementById('ln').textContent = Array.from({length:n},(_,i)=>i+1).join('\n');
  const w = ed.value.trim() ? ed.value.trim().split(/\s+/).length : 0;
  document.getElementById('stWords').textContent = w + ' слів';
}
function syncScroll() {
  document.getElementById('ln').scrollTop = document.getElementById('ed').scrollTop;
}
function handleTab(e) {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const ta = document.getElementById('ed');
  const s = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0,s) + '    ' + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = s + 4;
  updateLn();
}
function updateCursor() {
  const ta = document.getElementById('ed');
  const rows = ta.value.slice(0, ta.selectionStart).split('\n');
  document.getElementById('stCursor').textContent =
    'Рядок ' + rows.length + ', Стовпець ' + (rows[rows.length-1].length+1);
}
